n 		        script-binding uosc/next
b 		        script-binding uosc/prev
x 		        script-binding uosc/shuffle; script-message-to uosc flash-elements controls              
L 		        no-osd cycle-values loop-file "inf" "no"; script-message-to uosc flash-elements controls              
Z             no-osd cycle-values loop-playlist "no" "inf"; script-message-to uosc flash-elements controls         
mbtn_right 	  script-binding uosc/menu-blurred
menu 	        script-binding uosc/menu-blurred
P  		        script-binding uosc/toggle-progress
T 		        script-message-to uosc toggle-elements top_bar
tab           script-binding uosc/toggle-ui
space        	cycle pause; script-binding uosc/flash-pause-indicator
left         	seek -5; script-binding uosc/flash-timeline
shift+right  	seek  30; script-binding uosc/flash-timeline
shift+left   	seek -30; script-binding uosc/flash-timeline
m            	no-osd cycle mute; script-binding uosc/flash-volume
up        	  no-osd add volume  2; script-binding uosc/flash-volume
down         	no-osd add volume -2; script-binding uosc/flash-volume
[            	no-osd add speed -0.25; script-binding uosc/flash-speed
]            	no-osd add speed  0.25; script-binding uosc/flash-speed
\            	no-osd set speed 1; script-binding uosc/flash-speed

g-s           script-binding uosc/subtitles          #! Subtitles
g-a           script-binding uosc/audio              #! Audio tracks
g-q           script-binding uosc/stream-quality     #! Stream quality
g-p           script-binding uosc/items              #! Playlist
g-c           script-binding uosc/chapters           #! Chapters
>             script-binding uosc/next               #! Navigation > Next
<             script-binding uosc/prev               #! Navigation > Prev
del           script-binding uosc/delete-file-next   #! Navigation > Delete file & Next
alt+<         script-binding uosc/delete-file-prev   #! Navigation > Delete file & Prev
alt+esc       script-binding uosc/delete-file-quit   #! Navigation > Delete file & Quit
o             script-binding uosc/open-file          #! Navigation > Open file
#             set video-aspect-override no           #! Utils > Aspect ratio > Default
#             set video-aspect-override "16:9"       #! Utils > Aspect ratio > 16:9
#             set video-aspect-override "4:3"        #! Utils > Aspect ratio > 4:3
#             set video-aspect-override "2.35:1"     #! Utils > Aspect ratio > 2.35:1
#             script-binding uosc/audio-device       #! Utils > Audio devices
#             script-binding uosc/editions           #! Utils > Editions
ctrl+s        async screenshot                       #! Utils > Screenshot
ctrl+k        script-binding uosc/keybinds           #! Utils > Key bindings
O             script-binding uosc/show-in-directory  #! Utils > Show in directory
#             script-binding uosc/open-config-directory #! Utils > Open config directory
#             script-binding uosc/update             #! Utils > Update uosc
q             quit                                   #! Quit

Wheel_Left  ignore
Wheel_Right  ignore

